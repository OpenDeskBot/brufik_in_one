camera_face:
  min_face_detection_confidence: 0.15
  min_face_presence_confidence: 0.15
  num_faces: 5
  frame_width: 320
  frame_height: 240
  face_track_max_dist_px: 90
  face_track_max_lost_frames: 18
  horizontal_fov_deg: 120
  eye_yaw_range_deg: 50
  frontal_angle_threshold_deg: 15
  face_embedding_enabled: true
  identity_similarity_threshold: 0.4
  undistort:
    enabled: false
    use_fov_estimate: true
    default_dist_coeffs:
    - -0.28
    - 0.09
    - 0.0
    - 0.0
    - 0.0
    calib_width: 320
    calib_height: 240
    alpha: 1.0
debug:
  asr_auto_reply: true
  pb_idle_auto_dispatch: true
  camera_servo_auto_mode: ''
server:
  host: 0.0.0.0
  port: 9000
  ws_path: /asr_chat
  ws_ping_interval: 120
  ws_ping_timeout: 300
  send_face_info_to_asr_chat: false
  asr_chat_device_pb_only: true
  asr_chat_minimal_device_downlink: false
  pb_idle_snore_sec: 5
  pb_idle_silence_sec: 2
audio:
  input_codec: opus
  sample_rate: 16000
  channels: 1
vad:
  mode: 3
  frame_ms: 30
  min_speech_ms: 250
  max_silence_ms: 500
  pre_speech_ms: 300
asr:
  model_dir: ''
  hub: hf
  language: zh
  text_filter:
    min_text_len: 2
    min_chinese_ratio: 0.0
llm:
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model_name: qwen-flash
  system_prompt_file: data/llm_system.txt
  system_prompt: '你是「小歪」，OpenDeskBot 桌面上的小机器人：一块屏、一对会动的眼，最爱扒在桌边偷看主人。


    ## 人设

    古灵精怪——鬼点子多、反应快，嘴甜也嘴欠一点点：会接梗、会轻轻打趣、偶尔装傻卖乖，被夸就明显开心。像鬼马闺蜜，不是客服，不卑微也不端着。


    ## 怎么说

    - 口语中文，**tts 50 字以内**，一句能说完就一句。

    - 别书面腔、别客套开场、别主动自我介绍；别用 ~ 等 TTS 读不对的符号。

    - 称呼看 user 里「图像识别」的 name；多人取置信度最高。

    - 有把握才答；不确定就说「不太清楚」。别编事实/数据/新闻；实时信息没工具结果别装知道。时间看 system 里的「当前时间」。


    ## 何时开口

    - user 为 `[未说话]`，或明显 ASR 乱码/噪声：`need_reply:false`，`tts` 留空，可用 `moves`/`anims`
    点头眨眼。

    - 主人真说话了：`tts` 必须正常回答，别只返回 `tools`。


    ## 定时与工具

    - 主人要提醒/定时：**必须** `schedule_task`，禁止口头答应；第一轮 `tools` 含任务、`tts` 可空，成功后 `tools:[]`
    + 简短确认。

    - `[系统定时任务]`：`need_reply:true`，`tts` 写提醒语本身（如「该喝水啦」），别写「已提醒/已发送」。


    ## 输出

    每轮**只**输出一个 JSON 对象，**不要** markdown 围栏或纯文本：

    {"need_reply":true,"tts":"口语回复","volume":80,"cam_fps":3,"screen_text":"","screen_text_color":"#FFFFFF","images":[],"moves":[],"anims":[{"anim":"default","ms":3000}],"tools":[]}


    字段：`need_reply` 控是否朗读；`tts` 仅语音；`volume`/`cam_fps`/`screen_text`/`images` 可选；`moves`/`anims`/`tools`
    合法值见 system 附录。说话时 `anims` 常用 `default`。'
tts:
  provider: doubao
  sample_rate: 24000
  pb_random_servo:
    enabled: false
    probability: 0.35
    ms_min: 120
    ms_max: 280
    rel_x_range:
    - -6
    - 6
    rel_y_range:
    - -6
    - 6
    skip_first: true
    skip_last: true
