{% extends "base_2c.html" %}
{% block page_title %}家 · 小歪{% endblock %}
{% block content %}
      <div class="pagehd"><div><h1>下午好</h1><p>你的桌搭子现在很有精神。</p></div>
        <button class="btn ghost" onclick="location.href='{{ url_for('app2c.devices') }}'">＋ 绑定设备</button></div>
      <div class="homegrid">
        <div class="stage">
          <div class="ring"></div>
          <div class="face">
            <svg width="200" height="150" viewBox="0 0 150 120">
              <circle cx="48" cy="52" r="17" fill="#7fe7ff"/><circle cx="102" cy="52" r="17" fill="#7fe7ff"/>
              <circle cx="52" cy="48" r="5" fill="#0e0f1a"/><circle cx="106" cy="48" r="5" fill="#0e0f1a"/>
              <path d="M58 84 q17 16 34 0" stroke="#ff9ec4" stroke-width="6" fill="none" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="statusrow">
            <div class="chip"><span class="led"></span>在线</div>
            <div class="chip"><svg viewBox="0 0 24 24"><path d="M11 5L6 9H3v6h3l5 4z"/><path d="M16 9a4 4 0 010 6"/></svg>暖阳女声</div>
            <div class="chip"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8.5 14c1 1.3 6 1.3 7 0"/><circle cx="9" cy="10" r="1"/><circle cx="15" cy="10" r="1"/></svg>元气满满</div>
            <div class="chip"><svg viewBox="0 0 24 24"><path d="M6 3h12a1 1 0 011 1v16l-7-4-7 4V4a1 1 0 011-1z"/></svg>记得 3 件事</div>
          </div>
        </div>
        <div class="rightcol">
          <div class="heroes">
            <div class="hero exp" onclick="location.href='{{ url_for('app2c.expr') }}'"><div class="emoji"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8.5 14c1 1.3 6 1.3 7 0"/><circle cx="9" cy="10" r="1"/><circle cx="15" cy="10" r="1"/></svg></div><div><b>捏表情</b><br><span>换张脸 · 配情绪</span></div></div>
            <div class="hero voice" onclick="location.href='{{ url_for('app2c.voice') }}'"><div class="emoji"><svg viewBox="0 0 24 24"><path d="M11 5L6 9H3v6h3l5 4z"/><path d="M16 9a4 4 0 010 6"/><path d="M19 6a8 8 0 010 12"/></svg></div><div><b>调声音</b><br><span>挑音色 · 试听</span></div></div>
          </div>
          <div class="gridcards">
            <div class="mini" onclick="location.href='{{ url_for('app2c.memories') }}'"><div class="ic"><svg viewBox="0 0 24 24"><path d="M6 3h12a1 1 0 011 1v16l-7-4-7 4V4a1 1 0 011-1z"/></svg></div><b>它记得的事</b><small>3 条记忆</small></div>
            <div class="mini" onclick="location.href='{{ url_for('app2c.reminders') }}'"><div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div><b>提醒</b><small>2 个提醒</small></div>
            <div class="mini" onclick="location.href='{{ url_for('app2c.people') }}'"><div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg></div><b>认识的人</b><small>3 个人</small></div>
            <div class="mini" onclick="location.href='{{ url_for('app2c.devices') }}'"><div class="ic"><svg viewBox="0 0 24 24"><rect x="6" y="3" width="12" height="18" rx="2"/><path d="M11 18h2"/></svg></div><b>我的设备</b><small>1 台在线</small></div>
          </div>
        </div>
      </div>
{% endblock %}
