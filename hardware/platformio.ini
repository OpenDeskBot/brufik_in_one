; Deskbot — XIAO ESP32S3 Sense
; 烧录: ./flash_rom.sh all
;
; WiFi / WS: firmware/deskbot_config.h

[platformio]
src_dir = firmware

[env:deskbot_rom_common]
build_flags =
	-DBOARD_HAS_PSRAM
	-DWEBSOCKETS_MAX_DATA_SIZE=1048576
	-DWEBSOCKETS_TCP_TIMEOUT=5000
	-DWEBSOCKETS_TCP_WRITE_TIMEOUT=5000

[env:seeed_xiao_esp32s3]
extends = env:deskbot_rom_common
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions/deskbot_rom_8MB.csv
extra_scripts =
	pre:scripts/patch_websockets_max_data.py
	pre:scripts/patch_websockets_write_timeout_define.py
	pre:scripts/patch_websockets_write_deadline.py
	pre:scripts/patch_websockets_write_pump.py
	pre:scripts/patch_wifi_client_write_timeout.py
	pre:scripts/patch_wifi_client_write_pump.py
board_build.sdkconfig_defaults =
	firmware/sdkconfig.defaults
lib_ldf_mode = deep
build_flags =
	${env:deskbot_rom_common.build_flags}
	-DCONFIG_ESP_CONSOLE_NONE=1
lib_deps =
	https://github.com/sh123/esp32_opus_arduino.git
	links2004/WebSockets@^2.6.1
	adafruit/Adafruit ST7735 and ST7789 Library
	adafruit/Adafruit GFX Library
	adafruit/Adafruit BusIO
	bblanchon/ArduinoJson@^7
	bitbank2/JPEGDEC@^1.8.2
	olikraus/U8g2@^2.35.19
	https://github.com/olikraus/U8g2_for_Adafruit_GFX.git
	madhephaestus/ESP32Servo
